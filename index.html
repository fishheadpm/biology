<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生物 学習アプリ</title>
  <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
  <div class="container">
    <h1>生物 学習アプリ</h1>

    <div id="seriesScreen">
      <h2>単元を選択</h2>
      <div id="seriesButtons"></div>
    </div>

    <div id="menuScreen" class="hidden">
      <h2 id="roundTitle"></h2>
      <button onclick="start()">最初から</button>
      <button onclick="continueGame()">続きから</button>
      <button onclick="showHistory()">間違えた履歴</button>
      <button onclick="resetHistory()">履歴リセット</button>
      <button onclick="backToSeries()">戻る</button>
    </div>

    <div id="quizScreen" class="hidden">
      <p id="progress"></p>
      <div class="card">
        <p class="label">問題</p>
        <h2 id="question"></h2>
      </div>

      <button id="showAnswerButton" onclick="showAnswer()">答え表示</button>

      <div id="answerArea" class="hidden">
        <div class="card answer-card">
          <p class="label">答え</p>
          <h2 id="answer"></h2>
        </div>
        <button onclick="correct()">正解</button>
        <button onclick="wrong()">不正解</button>
      </div>

      <button class="sub" onclick="backToMenu()">メニューに戻る</button>
    </div>
  </div>

  <script src="app.js?v=1"></script>
</body>
</html>
